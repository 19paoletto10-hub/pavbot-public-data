name: PavbotViewer
options:
  bundleIdPrefix: com.paweltanski
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: SP774TZZU8
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    SWIFT_VERSION: "5.9"
configs:
  Debug: debug
  DebugPush: debug
  Release: release
  ReleasePush: release
targets:
  PavbotViewer:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: ../../public/pavbot-manifest.json
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paweltanski.pavbotviewer
        INFOPLIST_FILE: Sources/Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
      configs:
        DebugPush:
          CODE_SIGN_ENTITLEMENTS: Sources/PavbotViewerPush.entitlements
          APS_ENVIRONMENT: development
        ReleasePush:
          CODE_SIGN_ENTITLEMENTS: Sources/PavbotViewerPush.entitlements
          APS_ENVIRONMENT: production
    postBuildScripts:
      - name: Set Dynamic Build Number
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          BUILD_NUMBER="$(date -u +%Y%m%d%H%M)"
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ -f "$INFO_PLIST" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUMBER" "$INFO_PLIST"
            echo "Set CFBundleVersion to $BUILD_NUMBER"
          else
            echo "warning: Info.plist not found at $INFO_PLIST"
          fi
    dependencies:
      - sdk: AVFoundation.framework
      - sdk: PDFKit.framework
      - sdk: UserNotifications.framework
  PavbotViewerTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: PavbotViewer
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.paweltanski.pavbotviewer.tests
        GENERATE_INFOPLIST_FILE: YES
schemes:
  PavbotViewer:
    build:
      targets:
        PavbotViewer: all
        PavbotViewerTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - PavbotViewerTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  PavbotViewerPush:
    build:
      targets:
        PavbotViewer: all
        PavbotViewerTests: [test]
    run:
      config: DebugPush
    test:
      config: DebugPush
      targets:
        - PavbotViewerTests
    profile:
      config: ReleasePush
    analyze:
      config: DebugPush
    archive:
      config: ReleasePush
