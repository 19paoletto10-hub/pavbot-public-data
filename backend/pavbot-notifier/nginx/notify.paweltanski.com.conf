server {
    listen 80;
    listen [::]:80;
    server_name notify.paweltanski.com;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/paweltanski/webroot;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name notify.paweltanski.com;

    ssl_certificate     /etc/letsencrypt/live/notify.paweltanski.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/notify.paweltanski.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_timeout 1d;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_tickets off;

    access_log /var/log/nginx/pavbot-notifier_access.log;
    error_log  /var/log/nginx/pavbot-notifier_error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        proxy_pass http://127.0.0.1:18082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 60s;
    }
}
